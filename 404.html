<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // SPA redirect for GitHub Pages: preserves the path so index.html can read it
    var path = location.pathname;
    location.replace(location.origin + '/FormatGPT/' + '?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
