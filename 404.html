<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // SPA redirect for GitHub Pages
    // Extract the mode slug (last path segment) and redirect to base with ?p=
    var segs = location.pathname.split('/').filter(Boolean);
    var slug = segs.pop() || '';
    var base = segs.length ? '/' + segs.join('/') : '';
    location.replace(location.origin + base + '/?p=' + encodeURIComponent(slug));
  </script>
</head>
<body></body>
</html>
