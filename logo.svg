<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Main gradient: cyan → sky-blue → purple → light-cyan -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="33%"  stop-color="#38bdf8"/>
      <stop offset="66%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Glow filter for neon effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.133
                0 0 0 0 0.827
                0 0 0 0 0.933
                0 0 0 0.6 0" result="cyan"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow for the icon -->
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.133
                0 0 0 0 0.827
                0 0 0 0 0.933
                0 0 0 0.35 0" result="cyan"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for the icon bracket -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Gradient for format lines -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized bracket + formatting lines -->
  <g transform="translate(24, 14)" filter="url(#iconGlow)">
    <!-- Left bracket / "F" shape -->
    <path d="M8,8 L36,8 L36,16 L16,16 L16,42 L32,42 L32,50 L16,50 L16,84 L8,84 Z"
          fill="url(#bracketGrad)" opacity="0.95"/>

    <!-- Three formatting lines (representing text alignment) -->
    <rect x="44" y="12"  width="36" height="5" rx="2.5" fill="url(#lineGrad)" opacity="0.9"/>
    <rect x="44" y="28"  width="28" height="5" rx="2.5" fill="url(#lineGrad)" opacity="0.65"/>
    <rect x="44" y="44"  width="32" height="5" rx="2.5" fill="url(#lineGrad)" opacity="0.9"/>
    <rect x="44" y="60"  width="24" height="5" rx="2.5" fill="url(#lineGrad)" opacity="0.5"/>
    <rect x="44" y="76"  width="30" height="5" rx="2.5" fill="url(#lineGrad)" opacity="0.7"/>
  </g>

  <!-- Wordmark: "FormatGPT" -->
  <text x="138" y="78" font-family="Sora, system-ui, sans-serif" font-weight="800"
        font-size="52" letter-spacing="1" fill="url(#brandGrad)" filter="url(#glow)">
    Format<tspan fill="url(#bracketGrad)">GPT</tspan>
  </text>

  <!-- Accent underline -->
  <rect x="138" y="88" width="248" height="2" rx="1"
        fill="url(#brandGrad)" opacity="0.6"/>
</svg>
